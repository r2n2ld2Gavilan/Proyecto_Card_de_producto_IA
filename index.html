<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zapatillas COKER SPANIEL</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- CSS personalizado -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container py-5">

        <h1 class="text-center titulo-principal mb-4">
            zapatillas IA SECCIÓN 0710 en 3D
        </h1>

        <section class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5">

                <div class="card producto-card text-center">
                    <div class="card-body">

                        <h2 class="producto-nombre mb-3" id="nombreProducto">
                            Odin 1
                        </h2>

                        <!-- Selector de modelo -->
                        <div class="mb-3">
                            <label for="selectorModelo" class="form-label etiqueta">
                                Selecciona el modelo
                            </label>

                            <select id="selectorModelo" class="form-select selector-marca mx-auto">
                                <option value="Odin 1">Odin 1</option>
                                <option value="Odin 2">Odin 2</option>
                                <option value="Odin 3">Odin 3</option>
                                <option value="Odin 4">Odin 4</option>
                            </select>
                        </div>

                        <!-- Selector de colores -->
                        <div class="color-selector mb-4">
                            <span class="color-box color-blanco active" data-color="blanco" title="Color blanco: limpio, moderno y elegante"></span>
                            <span class="color-box color-negro" data-color="negro" title="Color negro: clásico, fuerte y combinable"></span>
                            <span class="color-box color-amarillo" data-color="amarillo" title="Color amarillo: llamativo, juvenil y diferente"></span>
                            <span class="color-box color-rojo" data-color="rojo" title="Color rojo: deportivo, intenso y moderno"></span>
                        </div>

                        <!-- Imagen del tenis -->
                        <div class="producto-img-contenedor">
                            <img 
                                src="Img/Odin 1 blanco.png" 
                                alt="Odin 1 color blanco" 
                                id="imagenTenis" 
                                class="img-fluid producto-img"
                                data-bs-toggle="modal"
                                data-bs-target="#modalTenis">
                        </div>

                        <!-- Precio -->
                        <p class="precio mt-4 mb-3" id="precioProducto">
                            $120 USD
                        </p>

                        <!-- Selector de tallas -->
                        <div class="mb-4">
                            <label for="talla" class="form-label etiqueta">
                                Selecciona tu talla
                            </label>

                            <select id="talla" class="form-select talla-select mx-auto">
                                <option value="38">38</option>
                                <option value="40">40</option>
                                <option value="42">42</option>
                            </select>
                        </div>

                        <!-- Botón comprar -->
                        <button class="btn comprar-btn w-100" id="btnComprar">
                            COMPRAR
                        </button>

                    </div>
                </div>

            </div>
        </section>

    </main>

    <!-- Modal -->
    <div class="modal fade" id="modalTenis" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-xl modal-90">
            <div class="modal-content modal-contenido">

                <div class="modal-header border-0">
                    <h5 class="modal-title">
                        Vista detallada del producto
                    </h5>

                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>

                <div class="modal-body text-center">
                    <img 
                        src="Img/Odin 1 blanco.png" 
                        alt="Odin 1 en vista grande" 
                        id="imagenModal" 
                        class="img-fluid imagen-modal">
                </div>

            </div>
        </div>
    </div>
    <!-- Modal de factura -->
<div class="modal fade" id="modalFactura" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content factura-modal">

            <div class="modal-header factura-header">
                <div>
                    <h5 class="modal-title mb-1">Resumen de compra</h5>
                    <small class="text-light">Compra confirmada</small>
                </div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>

            <div class="modal-body">
                <div class="factura-caja">
                    <div class="factura-top mb-3">
                        <h6 class="mb-1">Zapatillas COKER SPANIEL</h6>
                        <p class="mb-0"><strong>Orden:</strong> <span id="facturaNumero">FAC-000001</span></p>
                        <p class="mb-0"><strong>Fecha:</strong> <span id="facturaFecha">20/06/2026</span></p>
                    </div>

                    <hr>

                    <div class="factura-linea">
                        <span>Producto</span>
                        <strong id="facturaProducto">Odin 1</strong>
                    </div>

                    <div class="factura-linea">
                        <span>Color</span>
                        <strong id="facturaColor">Blanco</strong>
                    </div>

                    <div class="factura-linea">
                        <span>Talla</span>
                        <strong id="facturaTalla">38</strong>
                    </div>

                    <div class="factura-linea">
                        <span>Precio base</span>
                        <strong id="facturaPrecioBase">$120 USD</strong>
                    </div>

                    <div class="factura-linea">
                        <span>Extra por talla</span>
                        <strong id="facturaExtraTalla">$0 USD</strong>
                    </div>

                    <div class="factura-linea">
                        <span>Envío</span>
                        <strong>Gratis</strong>
                    </div>

                    <hr>

                    <div class="factura-total">
                        <span>Total</span>
                        <strong id="facturaTotal">$120 USD</strong>
                    </div>
                </div>
            </div>

            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
                    Cerrar
                </button>
                <button type="button" class="btn btn-dark" id="btnImprimirFactura">
                    Imprimir
                </button>
            </div>

        </div>
    </div>
</div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript personalizado -->
    <script src="script.js"></script>

</body>
</html>
